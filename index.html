<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ramallah Waste Containers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <style>
    body {
      margin: 0px;
      height: 100%;
      width: 100%;
    }
    #map {
      position: absolute;
      width: 100%;
      top: 0px;
      bottom: 0;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <script>
    // Define map options
    const mapOptions = {
      zoomSnap: 0.5,  // allows fractional zooming
      center: [31.9045, 35.2045], // center the map on the coordinates for Ramallah
      zoom: 17.5, // set the initial zoom level
    };

    // Define the map with the options
    const map = L.map("map", mapOptions);

    // Add a basemap
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    // Load and add the Ramallah zones GeoJSON data
    $.getJSON("RamallahZones.json", function(RZ) {
      L.geoJson(RZ).addTo(map);
    });

    // Create a layer group for waste containers
    let wasteContainerLayer = L.layerGroup();

    // Load wasteContainer GeoJSON data
    $.getJSON("wasteContainer.json", function(WC) {
      L.geoJson(WC, {
        onEachFeature: function (feature, layer) {
          layer.bindPopup("Waste Container ID: " + feature.properties.id);  // optional popup for info
        }
      }).addTo(wasteContainerLayer);
    });

    // Function to show/hide waste containers based on zoom level
    map.on('zoomend', function() {
      const currentZoom = map.getZoom();
      const minZoomToShow = 16;  // Minimum zoom level to show waste containers

      if (currentZoom >= minZoomToShow) {
        map.addLayer(wasteContainerLayer);  // Show waste containers if zoom level is high enough
      } else {
        map.removeLayer(wasteContainerLayer);  // Hide waste containers if zoom level is too low
      }
    });

    // Initial check to set the layer visibility when the page loads
    if (map.getZoom() < 16) {
      map.removeLayer(wasteContainerLayer);
    } else {
      map.addLayer(wasteContainerLayer);
    }
  </script>
</body>
</html>
